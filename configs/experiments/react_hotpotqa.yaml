# Baseline experiment: ReAct + no memory on HotPotQA validation split.
# Run: python run_experiment.py --config configs/experiments/react_hotpotqa.yaml

experiment:
  id: "react_hotpotqa_gpt4o_v1"
  seed: 42
  n_trials: 1
  max_steps: 25
  tags: ["react", "hotpotqa", "gpt-4o", "no-memory"]

agent:
  strategy: "react"
  llm:
    model: "gpt-4o"
    temperature: 0.0
  memory:
    type: "no_memory"
  tools:
    # Search is MockSearchTool (fixtures/search_responses.json); not live DuckDuckGo.
    - name: "search"
      config: {}
    - name: "calculator"
    - name: "finish"

tasks:
  dataset: "hotpotqa"
  split: "validation"
  n_samples: 5

evaluation:
  metrics:
    - "success_rate"
    - "pass_at_k"
    - "tool_accuracy"
    - "tokens_per_task"
    - "latency_p50"
  validator: "fuzzy_match"
  pass_k_values: [1, 3, 5]
  llm_judge_model: "claude-opus-4-7"
