# Defaults merged into every experiment config.
# Any field set in configs/experiments/*.yaml overrides these.

experiment:
  seed: 42
  n_trials: 5
  max_steps: 25
  output_dir: "results/"
  tags: []

agent:
  strategy: "react"
  llm:
    provider: "openai"
    model: "gpt-4o"
    temperature: 0.0
    max_tokens: 1024
  memory:
    type: "no_memory"
    window_size: 10
    top_k: 5
  tools: []

tasks:
  dataset: "hotpotqa"
  split: "validation"
  n_samples: 10

evaluation:
  metrics:
    - "success_rate"
    - "pass_at_k"
    - "tokens_per_task"
  validator: "fuzzy_match"
  pass_k_values: [1, 3, 5]

logging:
  level: "INFO"
  save_traces: true
  trace_format: "jsonl"
